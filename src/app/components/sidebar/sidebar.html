<div class="sidebar-wrapper" [class.collapsed]="isCollapsed">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sb-logo">
        <img src="logo.png" alt="Pulse Point" class="w-[160px]" />
    </div>

    <!-- Nav -->
    <nav class="sb-nav">
      <div class="sb-section">Main</div>

      <div
        *ngFor="let item of navItems"
        class="nav-item"
        [class.active]="isActive(item.route)"
        (click)="onNavClick(item)"
        [attr.data-tooltip]="isCollapsed ? item.label : null"
      >
        <svg *ngIf="item.icon === 'users'" class="nav-icon" viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <svg *ngIf="item.icon === 'bell'" class="nav-icon" viewBox="0 0 24 24">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <!-- <svg *ngIf="item.icon === 'settings'" class="nav-icon" viewBox="0 0 24 24">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg> -->
        <svg *ngIf="item.icon === 'dashboard'" class="nav-icon" viewBox="0 0 24 24">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>

        <span class="nav-label">{{ item.label }}</span>

        <span class="nav-badge"
          *ngIf="item.icon === 'bell' && unreadCount > 0 && !isCollapsed">
          {{ unreadCount }}
        </span>
        <span class="nav-badge-dot"
          *ngIf="item.icon === 'bell' && unreadCount > 0 && isCollapsed">
        </span>
      </div>
    </nav>

    <!-- Profile -->
    <div class="sb-profile" (click)="onLogout()">
      <div class="avatar">{{ initials }}</div>
      <div class="sb-profile-info">
        <div class="sb-profile-name">{{ username }}</div>
        <div class="sb-profile-role">{{ roleLabel }}</div>
      </div>
      <svg class="logout-icon" viewBox="0 0 24 24">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
    </div>

  </aside>

  <!-- ── TOGGLE — outside sidebar, aligned top ── -->
  <div class="toggle-area">
    <button class="toggle-btn" (click)="toggle()">
      <!-- Panel icon — matches shadcn style -->
      <svg class="toggle-icon" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
  </div>

</div>
