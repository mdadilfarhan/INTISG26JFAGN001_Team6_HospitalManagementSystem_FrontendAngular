<section
    class="relative w-full min-h-screen bg-no-repeat bg-cover bg-center font-poppins overflow-hidden -mt-[88px] pt-[88px]"
    style="background-image: url('hero-bg.png');">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-20 py-12 lg:py-16">
        <div class="flex flex-col lg:flex-row items-center gap-10 lg:gap-12 min-h-[calc(100vh-88px)]">

            <!-- ── LEFT: Text content ── -->
            <div class="flex-1 max-w-xl z-10">

                <!-- Main Headline -->
                <h1 class="text-4xl md:text-5xl font-black text-gray-900 leading-[1.15] mb-5 tracking-tight">
                    Pulse Point Redefining<br>
                    Healthcare Management
                </h1>

                <!-- Tagline -->
                <p class="text-[11px] font-bold tracking-[0.3em] text-gray-500 uppercase mb-4">
                    Care. Innovation. Trust
                </p>

                <!-- Body copy -->
                <p class="text-gray-500 text-sm leading-relaxed mb-10 max-w-[400px]">
                    Empowering hospitals with seamless systems, expert care, and smarter decisions for healthier
                    communities.
                </p>

                <!-- CTA Buttons -->
                <div class="flex items-center gap-4 mb-12 flex-wrap">
                    <button
                        class="bg-light hover:bg-[#0276C9] text-white px-7 py-3 rounded-full text-sm font-semibold transition-colors shadow-md shadow-blue-200">
                        Book Appointment
                    </button>
                    <button
                        class="bg-[#023C6E] hover:bg-[#02508f] text-white px-7 py-3 rounded-full text-sm font-semibold transition-colors shadow-md">
                        View Services
                    </button>
                </div>

                <!-- Doctor avatars + caption -->
                <div class="flex items-center gap-3">
                    <img src="avatar.png" alt="Connected doctors" class="h-10 object-contain" />
                    <p class="text-gray-500 text-xs leading-snug">
                        <span class="font-bold text-gray-700">100+ doctors</span> already<br>
                        connected with Pulse Point.
                    </p>
                </div>
            </div>

            <!-- ── RIGHT: Doctor image with floating badges ── -->
            <div class="hidden lg:flex flex-1 items-center justify-center relative">

                <!-- Main doctors image -->
                <img src="hero-doctor.png" alt="Pulse Point Doctors"
                    class="w-full max-w-[480px] h-auto object-contain" />

                <!-- Floating badge: 12+ Experienced Doctor (left side) -->
                <div
                    class="absolute left-0 top-[42%] bg-white rounded-2xl shadow-lg px-4 py-2.5 flex items-center gap-2 animate-float">
                    <div class="w-7 h-7 rounded-full bg-green-100 flex items-center justify-center shrink-0">
                        <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                        </svg>
                    </div>
                    <span class="text-[12px] font-semibold text-gray-700 whitespace-nowrap">12+ Experienced
                        Doctor</span>
                </div>

                <!-- Floating badge: Medical Achievements (right side, lower) -->
                <div
                    class="absolute right-0 bottom-[20%] bg-white rounded-2xl shadow-lg px-4 py-2.5 flex items-center gap-2 animate-float-delayed">
                    <span class="text-xl">🏅</span>
                    <span class="text-[12px] font-semibold text-gray-700 whitespace-nowrap">Medical Achievements</span>
                </div>
            </div>

        </div>
    </div>
</section>
