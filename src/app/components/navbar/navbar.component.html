<nav class="fixed top-0 backdrop-blur-md left-0 right-0 z-50 font-poppins transition-transform duration-500 ease-in-out"
    [class.-translate-y-full]="hidden()" [class.translate-y-0]="!hidden()">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-20 py-3">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <div class="flex items-center flex-shrink-0">
                <img src="logo.png" alt="Pulse Point" class="w-[150px] h-[40px] object-contain" />
            </div>

            <!-- Desktop Nav Links -->
            <div class="hidden md:flex items-center gap-2">
                @for (link of navLinks(); track link.label) {
                <a [routerLink]="link.path" (click)="setActive(link.label)"
                    class="text-sm font-semibold transition-all duration-200 px-5 py-2 rounded-full" [class]="link.active 
                ? 'text-white bg-light' 
                : 'text-gray-700 hover:text-[#1a7fd4]'">
                    {{ link.label }}
                </a>
                }
            </div>

            <!-- Right Actions -->
            <div class="hidden md:flex items-center">
                <button
                    class="bg-light rounded-full w-10 h-10 flex items-center justify-center hover:opacity-90 transition-opacity">
                    <lucide-icon [img]="PhoneIcon" class="w-[18px] h-[18px] text-white"></lucide-icon>
                </button>
                <button
                    class="bg-gray-300 mr-3 rounded-full w-10 h-10 flex items-center justify-center hover:bg-gray-400 transition-colors">
                    <lucide-icon [img]="BellIcon" class="w-[18px] h-[18px] text-gray-700"></lucide-icon>
                </button>
                <a routerLink="/login"
                    class="bg-[#023C6E] hover:bg-[#02508f] text-white text-sm font-semibold rounded-xl px-5 h-10 flex items-center justify-center gap-2 ml-1 transition-colors">
                    <lucide-icon [img]="UserRoundIcon" class="w-[16px] h-[16px]"></lucide-icon>
                    Login
                </a>
            </div>

            <!-- Mobile menu button -->
            <button class="md:hidden p-2 text-gray-700" (click)="toggleMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        [attr.d]="menuOpen() ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'" />
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        @if (menuOpen()) {
        <div class="md:hidden pb-4 pt-2 bg-white/95 backdrop-blur-sm rounded-2xl mt-2 px-4 shadow-lg">
            @for (link of navLinks(); track link.label) {
            <a [routerLink]="link.path" (click)="setActive(link.label); toggleMenu()"
                class="block py-2 text-sm font-medium text-gray-700 hover:text-[#1a7fd4]">
                {{ link.label }}
            </a>
            }
            <a routerLink="/login" (click)="toggleMenu()"
                class="mt-3 mb-1 block text-center bg-[#023C6E] text-white text-sm font-semibold px-4 py-2 rounded-full hover:bg-[#02508f]">
                Login
            </a>
        </div>
        }
    </div>
</nav>

<!-- Spacer so content isn't hidden behind fixed navbar -->
<div class="h-[88px]"></div>
