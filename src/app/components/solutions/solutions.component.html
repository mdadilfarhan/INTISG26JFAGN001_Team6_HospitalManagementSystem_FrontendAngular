<section class="py-16 lg:py-20 font-poppins">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-20">

        <!-- Header (centered) -->
        <div class="flex flex-col items-center text-center mb-12">
            <div class="inline-block border border-[#0276C9] px-3 py-1 rounded-md mb-5">
                <p class="text-xs text-[#0276C9] font-medium">Our Services</p>
            </div>
            <h2 class="text-3xl lg:text-4xl font-bold text-gray-900 leading-tight mb-3">
                Solutions That Put Well-Being First
            </h2>
            <p class="text-gray-500 text-sm">
                Comprehensive healthcare solutions for your well-being
            </p>
        </div>

        <!-- Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            @for (card of solutions(); track card.title) {
            <div class="group bg-white rounded-xl p-6 shadow-sm hover:shadow-lg transition-all cursor-pointer">

                <!-- Icon (no colored background, just the PNG) -->
                <div class="mb-5">
                    <img [src]="card.icon" [alt]="card.title" class="w-10 h-10 object-contain" />
                </div>

                <!-- Title -->
                <h3 class="text-lg font-semibold text-gray-900 mb-3 group-hover:text-[#1a7fd4] transition-colors">
                    {{ card.title }}
                </h3>

                <!-- Description -->
                <p class="text-sm text-gray-500 leading-relaxed">
                    {{ card.description }}
                </p>
            </div>
            }
        </div>

    </div>
</section>
