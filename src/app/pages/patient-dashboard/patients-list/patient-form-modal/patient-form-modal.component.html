<div (click)="onClose()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] overflow-y-auto font-poppins">

    <div class="flex min-h-full items-center justify-center p-4">
        <div (click)="$event.stopPropagation()" class="bg-white rounded-3xl shadow-2xl w-full max-w-lg my-8">

            <div class="bg-light px-6 py-5 flex items-center justify-between rounded-t-3xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <lucide-icon [img]="UserIcon" class="w-5 h-5 text-white"></lucide-icon>
                    </div>
                    <h3 class="text-white font-bold text-lg">{{ patient ? 'Edit Patient' : 'Add New Patient' }}</h3>
                </div>
                <button (click)="onClose()"
                    class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center text-white transition-colors">
                    <lucide-icon [img]="XIcon" class="w-4 h-4"></lucide-icon>
                </button>
            </div>

            <div class="p-6 space-y-4">

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Full Name *</label>
                    <input type="text" [(ngModel)]="formData.fullName"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#1a7fd4] transition-colors"
                        placeholder="Enter patient's full name" />
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Date of Birth *</label>
                        <input type="date" [(ngModel)]="formData.dob" (change)="onDobChange()"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#1a7fd4] transition-colors" />
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Age</label>
                        <input type="number" [(ngModel)]="formData.age" readonly
                            class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-2.5 text-sm" />
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Gender *</label>
                        <select [(ngModel)]="formData.gender"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#1a7fd4] transition-colors bg-white">
                            <option value="">Select</option>
                            @for (g of genders; track g) { <option [value]="g">{{ g }}</option> }
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Blood Group *</label>
                        <select [(ngModel)]="formData.bloodGroup"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#1a7fd4] transition-colors bg-white">
                            <option value="">Select</option>
                            @for (bg of bloodGroups; track bg) { <option [value]="bg">{{ bg }}</option> }
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Phone Number *</label>
                    <input type="tel" [(ngModel)]="formData.phoneNo" maxlength="15"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#1a7fd4] transition-colors"
                        placeholder="+91 9876543210" />
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Address *</label>
                    <textarea [(ngModel)]="formData.address" rows="3"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#1a7fd4] transition-colors resize-none"
                        placeholder="Full address"></textarea>
                </div>

                @if (errorMessage()) {
                <div class="bg-red-50 border border-red-200 text-red-600 text-xs px-4 py-2.5 rounded-lg">
                    {{ errorMessage() }}
                </div>
                }

                <div class="flex items-center gap-3 pt-2">
                    <button (click)="onClose()"
                        class="flex-1 px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 text-sm font-semibold hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button (click)="onSubmit()" [disabled]="isLoading()"
                        class="flex-1 px-5 py-2.5 rounded-xl bg-light hover:bg-[#0276C9] text-white text-sm font-semibold transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                        @if (isLoading()) { Saving... } @else { {{ patient ? 'Update Patient' : 'Add Patient' }} }
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
