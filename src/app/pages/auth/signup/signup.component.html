<div [formGroup]="signupForm">

  <div class="font-display text-[21px] font-bold text-navy-900 mb-3">Create account</div>

  <!-- Full Name -->
  <div class="mb-3">
    <label class="block text-[11px] font-semibold text-[#2d4a7a] mb-1.5 tracking-[.05em] uppercase">Full Name</label>
    <div class="relative">
      <input type="text" placeholder="Dr. John Smith" formControlName="fullName"
        class="auth-input w-full px-3.5 py-3 rounded-[11px] text-[13.5px] text-navy-900 outline-none"
        [class.input-error]="sf['fullName'].touched && sf['fullName'].invalid">
    </div>
    @if (fieldError('fullName')) {
    <span class="field-error">{{ fieldError('fullName') }}</span>
    }
  </div>

  <!-- Username -->
  <div class="mb-3">
    <label class="block text-[11px] font-semibold text-[#2d4a7a] mb-1.5 tracking-[.05em] uppercase">Email</label>
    <div class="relative">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-[#6b8ab5] pointer-events-none"
        viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
      </svg>
      <input type="text" placeholder="dr.johnsmith" formControlName="username" autocomplete="username"
        class="auth-input w-full pl-10 pr-3.5 py-3 rounded-[11px] text-[13.5px] text-navy-900 outline-none"
        [class.input-error]="sf['username'].touched && sf['username'].invalid">
    </div>
    @if (fieldError('username')) {
    <span class="field-error">{{ fieldError('username') }}</span>
    }
  </div>

  <!-- Password -->
  <div class="mb-3">
    <label class="block text-[11px] font-semibold text-[#2d4a7a] mb-1.5 tracking-[.05em] uppercase">Password</label>
    <div class="relative">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-[#6b8ab5] pointer-events-none"
        viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
      </svg>
      <input [type]="showPassword ? 'text' : 'password'" placeholder="Min. 6 characters"
        formControlName="password" autocomplete="new-password"
        class="auth-input w-full pl-10 pr-10 py-3 rounded-[11px] text-[13.5px] text-navy-900 outline-none"
        [class.input-error]="sf['password'].touched && sf['password'].invalid">
      <button type="button" (click)="togglePassword.emit()"
        class="absolute right-3.5 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer p-0 flex items-center text-[#6b8ab5] hover:text-brand-500 transition-colors">
        @if (!showPassword) {
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
        </svg>
        } @else {
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27z" />
        </svg>
        }
      </button>
    </div>
    @if (fieldError('password')) {
    <span class="field-error">{{ fieldError('password') }}</span>
    }
  </div>

  <!-- Confirm Password -->
  <div class="mb-3">
    <label class="block text-[11px] font-semibold text-[#2d4a7a] mb-1.5 tracking-[.05em] uppercase">Confirm Password</label>
    <div class="relative">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-[#6b8ab5] pointer-events-none"
        viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
      </svg>
      <input type="password" placeholder="Repeat password" formControlName="confirmPassword"
        autocomplete="new-password"
        class="auth-input w-full pl-10 pr-3.5 py-3 rounded-[11px] text-[13.5px] text-navy-900 outline-none"
        [class.input-error]="sf['confirmPassword'].touched && passwordMismatch">
    </div>
    @if (passwordMismatch) {
    <span class="field-error">Passwords do not match.</span>
    }
  </div>

  <div class="text-[13px] text-[#2d4a7a] my-4 leading-relaxed">
    Already have an account?
    <a class="font-bold underline cursor-pointer text-blue-900" (click)="switchToLogin.emit()">Login</a>
  </div>

  <button (click)="registerSubmit.emit()" [disabled]="isLoading"
    class="btn-cta w-full py-3 border-none rounded-xl cursor-pointer font-display text-[14.5px] font-semibold text-white tracking-[.02em] transition-all duration-200 disabled:opacity-70 disabled:cursor-not-allowed">
    @if (!isLoading) { Create My Account }
    @else {
    <span class="flex items-center justify-center gap-2"><span class="spin"></span> Creating account…</span>
    }
  </button>

</div>
